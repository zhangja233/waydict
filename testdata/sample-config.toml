[daemon]
socket = "$XDG_RUNTIME_DIR/waydict/waydict.sock"
preload_model = true
auto_stop_after_silence_seconds = 120
redact_transcripts_in_logs = true
log_level = "info"
# Answer `transcribe` from peers, lending this host's engine to clients that can
# reach the control socket. Enable it only on the machine holding the GPU.
serve_remote_asr = false

[audio]
backend = "pipewire"
sample_rate = 16000
channels = 1
format = "f32le"
quantum_ms = 20
ring_seconds = 8
target_object = ""
start_paused = true

[vad]
engine = "silero"
model = "~/.local/share/waydict/models/silero_vad.onnx"
window_size = 512
threshold = 0.35
negative_threshold = 0.15
min_speech_ms = 200
min_silence_ms = 500
speech_pad_ms = 300
pre_roll_ms = 400
max_speech_seconds = 20

[asr]
engine = "auto"
provider = ""
whisper_model = "ggml-large-v3-turbo"
gpu_device = 0
# Force GPU Whisper with: engine = "whisper-cpp", provider = "vulkan"
# Force CPU Sherpa with: engine = "sherpa-onnx", provider = "cpu"
model_type = "nemo_transducer"
decoding_method = "greedy_search"
num_threads = 4
max_active_paths = 4
blank_penalty = 0.0
model_dir = "~/.local/share/waydict/models/parakeet-unified-en-0.6b-fp32"
encoder = "encoder.onnx"
decoder = "decoder.onnx"
joiner = "joiner.onnx"
tokens = "tokens.txt"

# Only read when engine = "remote": decode on the daemon behind socket, which an
# SSH -L forward points at another host. The [asr] keys above then configure the
# fallback used whenever that host is unreachable.
[asr.remote]
socket = "$XDG_RUNTIME_DIR/waydict/asr-remote.sock"
codec = "pcm_s16le"
dial_timeout_ms = 300
request_timeout_ms = 8000
fallback = "sherpa-onnx"   # or "none" to fail instead of decoding locally

[injection]
engine = "wtype"
wtype_path = "wtype"
key_delay_ms = 1
timeout_ms = 10000
append_space = true
focus_policy = "cancel_on_focus_change"

[postprocess]
trim_leading = true
collapse_spaces = true
fix_punctuation_spacing = true
spoken_formatting_commands = false
smart_case = true

[sway]
require_sway = true
socket = "$SWAYSOCK"
focus_check = true

[debug]
save_audio_segments = false
save_audio_dir = "~/.local/state/waydict/segments"
log_transcripts = false
