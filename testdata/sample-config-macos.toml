[daemon]
# socket is omitted: the Darwin default is constructed as /tmp/waydict-<uid>/control.sock
preload_model = true
auto_stop_after_silence_seconds = 120
redact_transcripts_in_logs = true
log_level = "info"

[audio]
backend = "auto"                # auto or coreaudio on macOS
device = ""                     # empty = current system default; otherwise CoreAudio device UID
sample_rate = 16000
channels = 1
format = "f32le"
quantum_ms = 20
ring_seconds = 8
start_paused = true

[vad]
engine = "silero"               # silero or energy
model = "~/Library/Application Support/Waydict/models/silero_vad.onnx"
window_size = 512
threshold = 0.35
negative_threshold = 0.15
min_speech_ms = 200
min_silence_ms = 500
speech_pad_ms = 300
pre_roll_ms = 400
max_speech_seconds = 20

[asr]
engine = "auto"                 # auto, whisper-cpp, or sherpa-onnx
provider = ""                   # auto => Metal first on macOS; or metal/cpu
whisper_model = "ggml-large-v3-turbo"
gpu_device = 0
num_threads = 4

# sherpa-onnx CPU fallback settings
model_type = "nemo_transducer"
decoding_method = "greedy_search"
max_active_paths = 4
blank_penalty = 0.0
model_dir = "~/Library/Application Support/Waydict/models/parakeet-unified-en-0.6b-fp32"
encoder = "encoder.onnx"
decoder = "decoder.onnx"
joiner = "joiner.onnx"
tokens = "tokens.txt"

[injection]
engine = "auto"                 # auto or quartz on macOS
method = "unicode"
key_delay_ms = 1
timeout_ms = 10000
append_space = true

[focus]
enabled = true
backend = "auto"                # auto/accessibility; none is valid only with enabled=false
policy = "cancel_on_focus_change" # cancel_on_focus_change, warn_and_type, type_current

[hotkey]
enabled = true
key = "space"
modifiers = ["control", "shift", "command"]
mode = "hold"                   # hold, toggle, or oneshot

[postprocess]
trim_leading = true
collapse_spaces = true
fix_punctuation_spacing = true
spoken_formatting_commands = false
smart_case = true

[debug]
save_audio_segments = false
save_audio_dir = "~/Library/Application Support/Waydict/state/segments"
log_transcripts = false
